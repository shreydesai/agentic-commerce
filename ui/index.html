<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agentic Commerce — God View</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <!-- Startup modal -->
  <div id="startup-modal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-title">⚡ Agentic Commerce Simulator</div>
      <div id="modal-body">
        <div class="modal-loading">Checking for saved state…</div>
      </div>
    </div>
  </div>

  <header>
    <div class="header-left">
      <span class="logo">⚡ Agentic Commerce</span>
      <nav class="nav-tabs">
        <a class="nav-tab active" href="/">God View</a>
        <span class="nav-sep">|</span>
        <span class="nav-hint">Click an agent card to drill in</span>
      </nav>
    </div>
    <div class="header-stats">
      <div class="stat-pill" id="stat-revenue">💰 $0.00</div>
      <div class="stat-pill" id="stat-orders">📦 0 orders</div>
      <div class="stat-pill" id="stat-active">👤 0 active</div>
      <div class="stat-pill" id="stat-txn">🔁 0 transactions</div>
      <div class="stat-pill" id="stat-events">📡 0 events</div>
    </div>
    <div class="header-controls">
      <div class="sim-status">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-label">Stopped</span>
      </div>
      <button class="btn btn-stop" id="btn-stop" onclick="stopSim()" disabled>⏹ Stop</button>
    </div>
  </header>

  <main class="god-layout">
    <!-- Left: Consumers -->
    <section class="panel panel-left">
      <div class="panel-header">
        <h2>👤 Consumers</h2>
        <span class="panel-count" id="consumer-count">5</span>
      </div>
      <div class="agents-list" id="consumers-grid"></div>
    </section>

    <!-- Center: Network + Feed -->
    <section class="panel panel-center">
      <div class="network-container">
        <div class="panel-header">
          <h2>🕸 Network</h2>
          <span class="panel-count" id="net-edge-count">0 active connections</span>
        </div>
        <canvas id="network-canvas"></canvas>
      </div>
      <div class="feed-container">
        <div class="panel-header">
          <h2>📡 Activity Feed</h2>
          <div class="feed-filters">
            <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
            <button class="filter-btn" data-filter="transactions" onclick="setFilter('transactions')">Transactions</button>
            <button class="filter-btn" data-filter="purchases" onclick="setFilter('purchases')">Purchases</button>
            <button class="filter-btn" data-filter="supply" onclick="setFilter('supply')">Supply Chain</button>
            <button class="filter-btn" data-filter="reviews" onclick="setFilter('reviews')">Reviews</button>
          </div>
          <button class="btn-sm" onclick="clearFeed()">Clear</button>
        </div>
        <!-- Transaction grouped view -->
        <div id="txn-view" class="txn-list" style="display:none"></div>
        <!-- Normal feed -->
        <div id="feed" class="feed"></div>
      </div>
    </section>

    <!-- Right: Businesses -->
    <section class="panel panel-right">
      <div class="panel-header">
        <h2>🏪 B2C Businesses</h2>
        <span class="panel-count" id="b2c-count">8</span>
      </div>
      <div class="agents-list" id="b2c-grid"></div>
      <div class="panel-header" style="margin-top:6px">
        <h2>🏭 B2B Suppliers</h2>
        <span class="panel-count" id="b2b-count">4</span>
      </div>
      <div class="agents-list" id="b2b-grid"></div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
